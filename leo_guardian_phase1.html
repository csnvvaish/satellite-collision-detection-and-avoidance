<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LEO Guardian — Autonomous Space Traffic System</title>

<script src="https://unpkg.com/cesium/Build/Cesium/Cesium.js"></script>
<link href="https://unpkg.com/cesium/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer{
  width:100%; height:100%; margin:0; overflow:hidden;
}


#warningBox{
  position:absolute;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  max-width:420px;
  background:linear-gradient(135deg,#ff3b3b,#b30000);
  color:white;
  padding:14px 24px;
  font-size:19px;
  font-weight:bold;
  text-align:center;
  border-radius:18px;
  display:none;
  z-index:1000;
  box-shadow:
    0 0 20px rgba(255,0,0,.8),
    0 0 40px rgba(255,80,0,.5);
}


#missionPanel{
  position:absolute;
  top:70px;
  left:20px;
  color:#7CFFB2;
  font-family:monospace;
  font-size:16px;
  background:rgba(0,0,0,.45);
  padding:14px;
  border-radius:12px;
  z-index:999;
}

#controls{
  position:absolute;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(145deg,#111,#222);
  padding:14px 26px;
  border-radius:18px;
  box-shadow:0 0 20px rgba(0,255,150,.4);
  z-index:999;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

button{
  margin:6px;
  padding:10px 18px;
  font-weight:bold;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#0f3;
  color:black;
}

button:hover{ background:#5fff9f; }
</style>
</head>

<body>

<div id="cesiumContainer"></div>

<div id="warningBox">⚠ COLLISION</div>

<div id="missionPanel">
<b style="font-size:18px;">LEO GUARDIAN</b><br>
Status: <span id="status">Idle</span><br>
Objects: <span id="count">22</span><br>
Threat Level: <span id="threat">—</span><br>
Distance (A-B): <span id="distance">—</span> km
</div>

<div id="controls">
<button onclick="startSim()">▶ START</button>
<button onclick="pauseSim()">⏸ PAUSE</button>
<button onclick="speedUp()">⚡ SPEED </button>
<button onclick="resetSim()">🔁 RESET</button>
</div>

<script>



const viewer = new Cesium.Viewer("cesiumContainer", {
  terrainProvider:new Cesium.EllipsoidTerrainProvider(),
  timeline:false,
  animation:false,
  shouldAnimate:false
});


viewer.scene.globe.enableLighting = false;

viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(0,20,20000000)
});

viewer.clock.multiplier = 60;
const startTime = viewer.clock.startTime;


const statusEl = document.getElementById("status");
const threatEl = document.getElementById("threat");
const distanceEl = document.getElementById("distance");
const countEl = document.getElementById("count");
const warningBox = document.getElementById("warningBox");

let simStarted = false;
let collisionActive = false;



function orbit(alt, incDeg, speed, phase){
  const r = 6378137 + alt;
  const inc = Cesium.Math.toRadians(incDeg);

  return new Cesium.CallbackProperty(function(time){
    const t = Cesium.JulianDate.secondsDifference(time,startTime);
    const a = t*speed + phase;

    return new Cesium.Cartesian3(
      r*Math.cos(a),
      r*Math.sin(a)*Math.cos(inc),
      r*Math.sin(a)*Math.sin(inc)
    );
  }, false);
}



const SAT_A = viewer.entities.add({
  position: orbit(420000,51.6,0.002,0),
  point:{pixelSize:10,color:Cesium.Color.CYAN},
  label:{text:"Satellite A",font:"16px sans-serif",
         pixelOffset:new Cesium.Cartesian2(0,-18)}
});

const SAT_B = viewer.entities.add({
  position: orbit(420000,0,0.002,Math.PI/2),
  point:{pixelSize:10,color:Cesium.Color.YELLOW},
  label:{text:"Satellite B",font:"16px sans-serif",
         pixelOffset:new Cesium.Cartesian2(0,-18)}
});



const debris=[];
for(let i=0;i<20;i++){
  const phase=(i/20)*Math.PI*2;
  debris.push(
    viewer.entities.add({
      position:orbit(430000,30,0.003,phase),
      point:{pixelSize:3,color:Cesium.Color.WHITE}
    })
  );
}



const LIMIT = 15000;

viewer.clock.onTick.addEventListener(function(){

  if(!simStarted) return;

  const t = viewer.clock.currentTime;
  const elapsed = Cesium.JulianDate.secondsDifference(t,startTime);

  const pA = SAT_A.position.getValue(t);
  const pB = SAT_B.position.getValue(t);

  const dist = Cesium.Cartesian3.distance(pA,pB)/1000;
  distanceEl.innerText = dist.toFixed(1);

  if(dist > 1000){
    threatEl.innerText = "LOW";
    statusEl.innerText = "Monitoring";
  } else if(dist > 200){
    threatEl.innerText = "MEDIUM";
    statusEl.innerText = "Approaching";
  } else {
    threatEl.innerText = "HIGH";
    statusEl.innerText = "Danger";
  }

  countEl.innerText = 2 + debris.length;

  if(elapsed < 20 || collisionActive) return;

  if(dist*1000 < LIMIT){
    triggerCollision("🛰️ Collision — Satellite A & B", SAT_A);
    return;
  }

  for(let d of debris){
    const p = d.position.getValue(t);

    if(Cesium.Cartesian3.distance(p,pA) < LIMIT){
      triggerCollision("☄️ Debris Impact — Satellite A", SAT_A);
      return;
    }

    if(Cesium.Cartesian3.distance(p,pB) < LIMIT){
      triggerCollision("☄️ Debris Impact — Satellite B", SAT_B);
      return;
    }
  }
});



function triggerCollision(text, targetSat){

  collisionActive = true;

  warningBox.innerText = text;
  warningBox.style.display = "block";

  threatEl.innerText = "HIGH";
  statusEl.innerText = "Emergency";

  targetSat.point.color = Cesium.Color.RED;


  setTimeout(() => {

    warningBox.innerText = "🛡️ Autonomous Avoidance Activated";
    statusEl.innerText = "Response Mode";

    targetSat.position = orbit(480000, 60, 0.002, Math.random());

 
    debris.forEach(d => viewer.entities.remove(d));
    debris.length = 0;

  }, 3000);

 
  setTimeout(() => {

    warningBox.style.display = "none";

    threatEl.innerText = "LOW";
    statusEl.innerText = "Stabilized";
    countEl.innerText = 2;

  }, 7000);
}



function startSim(){
  viewer.clock.shouldAnimate = true;
  statusEl.innerText = "Monitoring";
  simStarted = true;
}

function pauseSim(){
  viewer.clock.shouldAnimate = false;
  statusEl.innerText = "Paused";
}

function speedUp(){
  viewer.clock.multiplier *= 5;
}

function resetSim(){
  location.reload();
}

</script>
</body>
</html>
